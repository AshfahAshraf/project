{% load static %}
<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CraftHover</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .sidebar {
            height: 100vh;
            background: #212529;
            color: white;
            padding-top: 20px;
            position: fixed;
            width: 220px;
        }

        .sidebar a {
            color: white;
            display: block;
            padding: 12px 20px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #343a40;
        }

        .main-content {
            margin-left: 220px;
        }
    </style>

</head>

<body class="bg-light">

    <div class="sidebar p-1">

        <h5 class="text-center mb-4">CraftHover</h5>

        <a href="{% url 'artisan_dashboard' %}">Dashboard</a>
        <a href="{% url 'artisan_products' %}">Products</a>
        <a href="{% url 'artisan_orders' %}">Orders</a>
        <a href="{% url 'artisan_profile' %}">Profile Management</a>

        <hr>
        <a href="{% url 'artisan_logout' %}" class="btn btn-danger mt-3">
            Logout
        </a>

    </div>

    <div class="main-content">

        <div class="container py-4">

            {% block content %}
            {% endblock %}

        </div>

    </div>

</body>

</html>
