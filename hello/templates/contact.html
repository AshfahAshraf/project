<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</head>

<body>
    <h1>Report an issue</h1>
    <p>if something went wrong with your order, we're here to help</p>
    <div class="row m-5">
    <div class="container col-lg-6 col-md-6 col-12 bg-success">
        <form action="">

            <div>
                <label for="">Full Name</label>
                <input type="text" name="fullname" required>
            </div>

            <div>
                <label for="">Email</label>
                <input type="email" name="email" required>
            </div>
            <div>

                <label for="">Phone Number</label>
                <input type="number" name="phonenumber" required>
            </div>
            <div>

                <label for="">Order Id</label>
                <input type="text" name="orderid" required>
            </div>
            <div>

                <label for="">Product Name</label>
                <input type="text" name="productname" required>
            </div>
            <div>

                <label for="">Type of issue</label>
                <select name="issue_type" id="">
                    <option value="">Select Issue</option>
                    <option value="">Damaged Product</option>
                    <option value="">Wrong Product Received</option>
                    <option value="">Missing Item</option>
                    <option value="">Refund Issue</option>
                    <option value="">Delivery Delay</option>
                </select>
            </div>
            <div>
                <label for="">Upload Product Image</label>
                <input type="file" name="product_image">
            </div>
            <div>
                <label for="">Describe the Problem</label>
                <textarea name="description" rows="5" id="" required></textarea>
            </div>
            <div>

                <button type="submit">Submit Complaint</button>
            </div>
        </form>
    </div>
    <div class="col-lg-6 col-md-6 col-12">
        <h3>Contact us</h3>
        <p><i class="fa-solid fa-location-dot"></i><b>Address</b>:bangalore</p>
        <br>
        <p><i class="fa-solid fa-phone"></i><b>Phone</b>:12345 67890</p>
        <br>
        <p><i class="fa-solid fa-envelope"></i><b>Email</b>:crafthover@email.com</p>
         <p>Response Time: Within 24–48 Hours</p>
    <p>Available: Monday – Saturday (9AM – 6PM)</p>
        <br>



    </div>

</div>
</body>

</html>
