<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container my-4">

        <div class="card shadow-sm mb-4">
            <div class="d-flex flex-column flex-md-row gap-3">
                <input type="text" class="form-control" placeholder="Search your orders here">
                <button class="btn btn-primary">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
        </div>

        <div class="col-lg-3">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="fw-bold mb-3">Filters</h5>

                    <h6 class="fw-semibold">ORDER STATUS</h6>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox">
                        <label for="form-check-label">On the way</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox">
                        <label for="form-check-label">Delivered</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox">
                        <label for="form-check-label">Cancelled</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox">
                        <label for="form-check-input">Returned</label>
                    </div>

                    <h6 class="fw-semibold">ORDER STATUS</h6>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox">
                        <label for="form-check-input">Last 30 Days</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox">
                        <label for="form-check-input"> 2025</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox">
                        <label for="form-check-input"> 2024</label>
                    </div>

                    <div class="form-check">
                        <input  class="form-check-input" type="checkbox">
                        <label for="form-check-input"> 2023</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox">
                        <label for="form-check=input"> older </label>
                    </div>

                </div>


            </div>
        </div>
    </div>
    
</body>
</html>
