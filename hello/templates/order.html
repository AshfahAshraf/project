{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

<body class="bg-light">
    <div class="container my-4">

       
            <div class="d-flex flex-column flex-md-row gap-3">
                <input type="text" class="form-control" placeholder="Search your orders here">
                <button class="btn btn-primary">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
       
        <div class="row">
            <div class="col-lg-3 mt-5">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="fw-bold mb-3">Filters</h5>

                        <h6 class="fw-semibold">ORDER STATUS</h6>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox">
                            <label for="form-check-label">On the way</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox">
                            <label for="form-check-label">Delivered</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox">
                            <label for="form-check-label">Cancelled</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox">
                            <label for="form-check-input">Returned</label>
                        </div>

                        <h6 class="fw-semibold">ORDER STATUS</h6>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox">
                            <label for="form-check-input">Last 30 Days</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox">
                            <label for="form-check-input"> 2025</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox">
                            <label for="form-check-input"> 2024</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox">
                            <label for="form-check-input"> 2023</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox">
                            <label for="form-check=input"> older </label>
                        </div>

                    </div>


                </div>
            </div>

            <div class="col-lg-9 mt-5">

                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <div class="row align-items-center">

                            <!-- LEFT SIDE -->
                            <div
                                class="col-12 col-md-6 d-flex flex-column flex-sm-row align-items-start align-items-sm-center mb-3 mb-md-0">

                                <img src="{% static 'images/jewelry_item1.jpg' %}" class="rounded me-sm-3 mb-3 mb-sm-0"
                                    style="width:120px;height:120px;object-fit:cover;">

                                <div>
                                    <h6 class="mb-1">Chain</h6>
                                    <p class="text-muted mb-1">Golden</p>
                                    <strong>₹2500</strong>
                                </div>
                            </div>

                            <!-- RIGHT SIDE -->
                            <div
                                class="col-12 col-md-6 d-flex flex-column align-items-start align-items-md-end text-start text-md-end">

                                <p class="mb-1 text-success fw-semibold">
                                    <i class="fa-solid fa-circle small me-1"></i>
                                    Delivered on March 6
                                </p>

                                <small class="text-muted mb-2">
                                    Your item has been delivered
                                </small>

                                <a href="#" class="text-primary text-decoration-none fw-medium">
                                    <i class="fa-solid fa-star me-1"></i>
                                    Rate & Review Product
                                </a>

                            </div>

</div>
 </div>
                            </div>
                            <div class="card shadow-sm mb-4">

                                <div class="card-body">

                                class="col-12 col-md-6 d-flex flex-column flex-sm-row align-items-start align-items-sm-center mb-3 mb-md-0">

                                <img src="{% static 'images/jewelry_item2.jpg' %}" class="rounded me-sm-3 mb-3 mb-sm-0"
                                    style="width:120px;height:120px;object-fit:cover;">

                                <div>
                                    <h6 class="mb-1">Chain</h6>
                                    <p class="text-muted mb-1">Golden</p>

                                </div>
                            </div>

                            <!-- RIGHT SIDE -->
                            <div class="col-12 col-md-6 d-flex flex-column align-items-start align-items-md-end text-start text-md-end">

                                <p class="mb-1 text-warning fw-semibold">
                                    <i class="fa-solid fa-circle small me-1"></i>
                                    Shipped on March 20
                                </p>

                                <small class="text-muted mb-2">
                                    Your item is on the way
                                </small>

                                <a href="#" class="text-primary text-decoration-none fw-medium">
                                    <i class="fa-solid fa-truck me-1"></i>
                                    Track my order
                                </a>

                            </div>
</div>
                       </div>
                    
                </div>
            
        </div>

    </div>
