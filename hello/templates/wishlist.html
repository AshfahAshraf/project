{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</head>
<body>
    <div class="container my-5 p-5 rounded-5 shadow-lg "style="background-color: #e6dac8";>

        <h2 class="mb-4">My Wishlist</h2>

        <div class="border rounded-4 p-3 bg-white">

            <div class="row align-items-center gy-3">

                <!--Product Image -->
                <div class="col-lg-2 col-md-3 col-4 text-center" >

                    <img src="{{ item.product.product_image.url }}" class="product-img img-fluid rounded" alt="">
                   
                </div>
                <!--Product info-->

                <div class="col-lg-4 col-md-5 col-8">

                    <h5 class="mb-1">{{ item.product.Product_name }}</h5>

                    <p class="text-muted">{{ item.product.artisan.name }}</p>


                </div>

                

                <!--actions-->

                <div class="col-lg-6 col-md-12 action-section">

                        <div class="d-flex flex-lg-row flex-column flex-md-row
                         align-items-md-center align-items-start justify-content-lg-end gap-3">

                    <!-- price -->
                    <h6 class="fw-bold mb-0">₹{{ item.product.offer_price }}</h6>
                
                    <!-- Quantity -->
                <div class="d-flex align-items-center gap-2">
                    
                    <label>Qty</label>
                
                  <input type="number"
                   class="form-control"
                   style="width: 70px;"
                   value="1"
                   min="1">
                </div>

                <!-- add to cart -->
                    <a href="{% url 'wishlist_to_cart' item.id %}" class="btn btn-dark">Add to Cart</a>

                <!-- remove--> 
                 <a href="{% url 'remove_wishlist' item.id %}" class="btn btn-outline-secondary">X</a>               
            </div>
        </div>

</div>
</div>
{% empty %}

<div class="text-center p-5 bg-white rounded-4">
    <h5>Your wishlist is empty</h5>
    <p class="text-muted">Start adding products you love ❤️</p>

{% endfor %}
</div>
 <div class="mt-3">
        <a href="{% url 'home' %}" class="text-decoration-none">
            ← Back to shop
        </a>
    </div>

    </div>
</body>
</html>
