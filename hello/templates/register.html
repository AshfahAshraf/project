{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Signup Page</title>
    

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/register.css' %}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>
<body>
    <div class="container ">
    <!-- Login Form-->
     <div class="form-box login">
        <form action="#">
            <h1>Login</h1>
            <div class="input-box">
                <input type="text" placeholder="Email or Phone Number" required>
                
            </div>
             <div class="input-box">
                <input type="password" placeholder="Password" required>
               
            </div>
            <div class="forgot-link">
                <a href="#">Forgot Password?</a> 
            </div>
            <button type="submit" class="custom-btn">Sign in</button>
            <p>or Login with social platforms</p>
            <div class="social-icons">
                <a href="#"><i class="fa-brands fa-google"></i></a>
                <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                
            </div>
        </form>
     </div>
     <!-- Register Form-->
      <div class="form-box register">
        
        <form onsubmit="return validateForm()" >
            <h1>Create Account</h1>
            <div class="input-box">
                <input type="text" id="email_or_phone" placeholder="Email or Phone Number">
                <div id="userError" class="error-text"></div>
            </div>
             <div class="input-box">
                <input type="password" id="password" placeholder="Password" >
               <div id="passwordError" class="error-text"></div>
            </div>
             <div class="input-box">
                <input type="password" id="confirmPassword" placeholder="Confirm Password">
                <div id="confirmError" class="error-text"></div>
            </div>
           
            <button type="submit" class="custom-btn">Sign Up</button>
            <div class="terms">
            <input type="checkbox" required>
            <label for="terms">By creating an account, i accept the<a href="#"> Terms & Conditions</a> &<a href="#">Privacy Policy</a> </label></div>
            <p>or register with social platforms</p>
            <div class="social-icons">
                <a href="#"><i class="fa-brands fa-google"></i></a>
                <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                
            </div>
            
        </form>
     </div>
      
      
    <!-- Toggle Box -->
     <div class="toggle-box"></div>
     <!-- Toggle Box Left-->
     <div class="toggle-panel toggle-left">
        <h1>Hello. Welcome!</h1>
        <p>Don't have an account!</p>
        <button type="button" class="btn register-btn">Create Account</button>
     </div>
     <!-- Toggle Box Right-->
        <div class="toggle-panel toggle-right">
            <h1>Welcome Back!</h1>
            <p>Already have an account?</p>
            <button type="button" class="btn login-btn">Sign In</button>
        </div>
     </div>
     </div>

    <script src="{% static 'js/register.js' %}"></script>
</body>
</html>
