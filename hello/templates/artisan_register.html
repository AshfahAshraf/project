{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body class="bg-light">
    
        <div class="container py-5">

            <h2 class="text-center mb-4">Artisan Register</h2>


            <p class="text-center text-muted">
    Already have an account?
    <a href="{% url 'artisan_login' %}" class="text-decoration-none">Login</a>
</p>
          
      


        <form method="POST">
{% csrf_token %}

<!-- STEP 1 -->
<div {% if show_step2 %}style="display:none;"{% endif %}>

    <h5>Email Verification</h5>

    <div class="row g-2">
        <div class="col-8">
            <input type="email" name="email" class="form-control"
                   value="{{ email }}" required>
        </div>

        <div class="col-4">
            <button type="submit" name="send_otp" formnovalidate class="btn btn-primary w-100">
                Send OTP
            </button>
        </div>
    </div>

    <!-- OTP BOX -->
    <div class="mt-3"
        {% if show_otp or show_step2 %}
            style="display:block;"
        {% else %}
            style="display:none;"
        {% endif %}>

        <input type="text" name="otp" class="form-control mb-2" placeholder="Enter OTP">

        <button type="submit" name="verify_otp" formnovalidate class="btn btn-success w-100">
            Verify OTP
        </button>
    </div>

</div>

<!-- STEP 2 -->
<div {% if show_step2 %}style="display:block;"{% else %}style="display:none;"{% endif %}>

    <h5>Account Details</h5>

    <input type="text" name="name" class="form-control mb-2" placeholder="Name">
    <input type="text" name="phone" class="form-control mb-2" placeholder="Phone">

    <input type="email" class="form-control mb-2" value="{{ email }}" readonly>
<input type="password" name="password" class="form-control mb-2" placeholder="Password">
<input type="password" name="confirm_password" class="form-control mb-2" placeholder="Confirm Password">
    <h5>Shop Details</h5>

    <input type="text" name="shop_name" class="form-control mb-2" placeholder="Shop Name">
    <textarea name="address" class="form-control mb-2" placeholder="Address"></textarea>

    <input type="text" name="city" class="form-control mb-2" placeholder="City">
    <input type="text" name="state" class="form-control mb-2" placeholder="State">
    <input type="number" name="pincode" class="form-control mb-2" placeholder="Pincode">

    <button type="submit" name="register" class="btn btn-success w-100">
        Register
    </button>

</div>

{% if message %}
<p style="color:red;">{{ message }}</p>
{% endif %}

</form>
  </div>
         <script src="{% static 'js/artisan_register.js' %}"></script>
     
</body>

</html>
