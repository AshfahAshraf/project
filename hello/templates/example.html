<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CraftHover</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

 <style>
    body {
    font-family: 'Poppins', sans-serif;
}

/* HERO */
.hero {
    min-height: 100vh;
    background: linear-gradient(to bottom, #eaf2f8, #ffffff);
    padding: 80px 20px;
    overflow: hidden;
}

/* TITLE */
.hero-title {
    font-size: 80px;
    font-weight: 900;

    /* blur effect */
    background: linear-gradient(to bottom, black 60%, rgba(0,0,0,0.2));
    -webkit-background-clip: text;
    color: transparent;

    filter: blur(6px);
    opacity: 0.7;

    transition: all 1s ease;
}

/* SUBTEXT */
.hero-sub {
    font-size: 20px;
    color: #555;
}

/* IMAGE */
.hero-image img {
    max-width: 900px;
    transform: translateY(100px);
    transition: all 1s ease;
}

/* ACTIVE SCROLL */
.hero.active .hero-title {
    filter: blur(0);
    opacity: 1;
}

.hero.active .hero-image img {
    transform: translateY(0);
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .hero-title {
        font-size: 40px;
    }

    .hero-sub {
        font-size: 16px;
    }
}
 </style>
</head>

<body>

<section class="hero text-center d-flex align-items-center justify-content-center">
  <div class="container">

    <!-- HEADING -->
    <h1 class="hero-title">
      Find What Inspires You
    </h1>

    <!-- SUBTEXT -->
    <p class="hero-sub mt-3">
      Authentic crafts. Handmade with love. Discover unique artisan products.
    </p>

    <!-- BUTTON -->
    <button class="btn btn-dark rounded-pill mt-4 px-4 py-2">
      Shop Handmade →
    </button>

    <!-- IMAGE -->
    <div class="hero-image mt-5">
      <img src="https://images.unsplash.com/photo-1605276373954-0c4a0dac5b12"
           class="img-fluid rounded-4 shadow-lg"
           alt="artisan">
    </div>

  </div>
</section>

<script>window.addEventListener("scroll", function () {
    const hero = document.querySelector(".hero");
    const position = hero.getBoundingClientRect().top;
    const screenHeight = window.innerHeight;

    if (position < screenHeight - 100) {
        hero.classList.add("active");
    }
});</script>
</body>
</html>
